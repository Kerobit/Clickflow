name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
    env:
      CLICKFLOW_TEST_URL: http://127.0.0.1:8123
      CLICKFLOW_TEST_DATABASE: clickflow_ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:8123/ping" >/dev/null; then
              echo "ClickHouse is up"
              exit 0
            fi
            sleep 2
          done
          echo "ClickHouse did not become ready"
          exit 1

      - name: Integration tests
        run: pnpm test:integration
